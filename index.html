<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intrepid Goat Co. | Handcrafted Leather Goods</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #0b0b0b;
      color: #efe9d8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 600px;
      background: #111111;
      border: 1px solid rgba(239, 233, 216, 0.12);
      border-radius: 18px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 100%;
      max-width: 260px;
      height: auto;
      display: block;
      margin: 0 auto 20px;
      border-radius: 8px;
    }

    .tagline {
      font-size: 1.35rem;
      line-height: 1.4;
      margin: 0 0 18px;
      letter-spacing: 0.02em;
    }

    .body-text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: #d8d2c3;
      margin: 0 0 14px;
    }

    .contact {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(239, 233, 216, 0.12);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1rem;
      color: #efe9d8;
    }

    .contact a {
      color: #efe9d8;
      text-decoration: none;
      border-bottom: 1px solid rgba(239, 233, 216, 0.35);
    }

    .contact a:hover {
      border-bottom-color: rgba(239, 233, 216, 0.8);
    }

    @media (max-width: 600px) {
      .box {
        padding: 28px 20px;
      }

      .logo {
        max-width: 220px;
      }

      .tagline {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="logo.png" alt="Intrepid Goat Co. logo" class="logo" />

    <p class="tagline">Handcrafted leather goods built to last.</p>

    <p class="body-text">Built in small batches. Made to be used.</p>

    <p class="body-text">Belts and leather goods from a small shop focused on quality over mass production.</p>

    <p class="body-text">Full site coming later. Custom orders available now.</p>

    <div class="contact">
      Contact: <a href="mailto:intrepidgoatco@gmail.com">intrepidgoatco@gmail.com</a>
    </div>
  </div>
</body>
</html>
